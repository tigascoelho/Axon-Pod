<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08080a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Axon Tracker — Premium football performance tracking powered by wearable pod technology" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Axon Tracker · Football Performance</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #08080a;
        color: #f0f0f5;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      #boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      #boot-fallback h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      #boot-fallback p {
        margin: 0;
        opacity: 0.85;
        font-size: 13px;
      }
      body.app-ready #boot-fallback {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback" role="status" aria-live="polite">
      <div>
        <h1>Starting Axon Tracker...</h1>
        <p>If this screen stays for more than a few seconds, the in-app browser blocked app scripts.</p>
      </div>
    </div>
    <script>
      window.addEventListener('error', function () {
        var el = document.querySelector('#boot-fallback p');
        if (el) el.textContent = 'Startup failed in this browser. Try opening the same link in Safari/Chrome.';
      });

      setTimeout(function () {
        var root = document.getElementById('root');
        if (!root || root.childElementCount === 0) {
          var el = document.querySelector('#boot-fallback p');
          if (el) el.textContent = 'App did not initialize. Check if all ./assets files were uploaded together.';
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
